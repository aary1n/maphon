    path: docs/figures/f1_mode_maps.png
    kind: generated
    generator: cavity.figures.f1_mode_maps
    command: "python -m cavity.figures --out <build_dir>"
    byte_pinned: false        # data-pinned + render smoke; PDFs strip creation date
    pin_tests: ["tests/test_figures.py::test_f1_data_pins", "tests/test_figures.py::test_render_smoke_shared_style"]
