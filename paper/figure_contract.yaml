# Figure / artifact contract — paper-facing generated artifacts
# Consumed by `python -m publication.build` (WS4) and guarded by
# tests/test_paper_spine.py. One entry per paper-facing artifact.
#
# kind:
#   generated  - produced by a generator; regeneration must reproduce it
#                (byte_pinned: true) or satisfy its data pins (value-pinned)
#   record     - dated immutable record (archives, gate runs, hand-authored
#                dated notes); NEVER regenerated; verified by hash/manifest
#                or left as committed history
# required_caveats: token strings that MUST appear verbatim in the artifact
# (or its caption source) — the build command greps for them.

schema: figure-contract/v1
generated: 2026-07-20

artifacts:
